name: Deploy na seohost (FTP)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Zainstaluj lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Wyslij pliki przez lftp (FTPS)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME_PREZENTY }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD_PREZENTY }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" -e 'set ftp:ssl-force true; set ftp:ssl-protect-data true; set net:max-retries 5; set net:timeout 40; mirror -R --verbose --exclude-glob .git* --exclude-glob .github* --exclude-glob README.md ./ ./; bye' "$FTP_SERVER"
