name: Deploy na seohost + purge Cloudflare
# Po kazdym pushu na main: wgranie plikow na SEOhost (FTPS) -> purge cache Cloudflare.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Zainstaluj lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Wgranie na SEOhost (FTPS)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME_PREZENTY }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD_PREZENTY }}
        run: |
          # Uwaga: verify-certificate=false zatwierdzone przez wlasciciela repo -
          # serwer FTP seohost uzywa certyfikatu bez publicznego wystawcy.
          lftp -u "$FTP_USER,$FTP_PASS" -e 'set ssl:verify-certificate false; set ftp:ssl-force true; set ftp:ssl-protect-data true; set net:max-retries 5; set net:timeout 40; mirror -R --verbose --exclude-glob .git* --exclude-glob .github* --exclude-glob README.md ./ ./; bye' "$FTP_SERVER"

      - name: Purge cache Cloudflare
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ]; then echo "::notice::Brak CF_ZONE_ID - pomijam purge."; exit 0; fi
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | grep -q '"success":true' \
            && echo "Cloudflare cache wyczyszczony." \
            || echo "::warning::Purge Cloudflare nie powiodl sie (sprawdz CF_ZONE_ID / CF_API_TOKEN)."
