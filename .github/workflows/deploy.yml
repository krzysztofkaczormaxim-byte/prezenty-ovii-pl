name: Deploy → SEOhost + purge Cloudflare
# Po każdym pushu na main: wgranie plików na SEOhost (FTP) → purge Cloudflare.
# Mechanizm identyczny jak w repo B2B_OVII_PL (horeca.ovii.pl), bez kroku build.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sprawdź konfigurację (sekrety)
        id: cfg
        run: |
          if [ -z "${{ secrets.FTP_SERVER }}" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Sekrety FTP nie są ustawione — pomijam deploy."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.cfg.outputs.ready == 'true'
        uses: actions/checkout@v4

      - name: Wgranie na SEOhost (FTP)
        if: steps.cfg.outputs.ready == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME_PREZENTY }}
          password: ${{ secrets.FTP_PASSWORD_PREZENTY }}
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR_PREZENTY }}
          exclude: |
            **/.git*
            **/.git*/**
            **/README.md

      - name: Purge cache Cloudflare
        if: steps.cfg.outputs.ready == 'true'
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
        run: |
          if [ -z "$CF_ZONE_ID" ]; then echo "::notice::Brak CF_ZONE_ID — pomijam purge."; exit 0; fi
          curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' | grep -q '"success":true' \
            && echo "Cloudflare cache wyczyszczony." \
            || echo "::warning::Purge Cloudflare nie powiódł się (sprawdź CF_ZONE_ID / CF_API_TOKEN)."
